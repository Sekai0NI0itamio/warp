name: Build macOS arm64 artifact

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref to build (branch, tag, or SHA). Leave empty to build current ref."
        required: false
        type: string
      fast_build:
        description: "Enable faster debug-profile DMG build (for validation, not release-quality perf)."
        required: false
        default: false
        type: boolean
      artifact_type:
        description: "Artifact type to build."
        required: false
        default: app
        type: choice
        options:
          - app
          - dmg

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CHANNEL: oss

jobs:
  build_macos_arm64:
    name: Build OpenWarp ${{ inputs.artifact_type }} (arm64)
    runs-on: macos-26
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.git_ref != '' && inputs.git_ref || github.ref }}

      - name: Prepare environment
        uses: ./.github/actions/prepare_environment
        with:
          target_os: macos
          is_self_hosted: false
          install_release_deps: true
          cache_key: macos-arm64-dmg
          cache_workspace_crates: true

      - name: Ensure rust target is installed
        shell: bash
        run: rustup target add aarch64-apple-darwin

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: stable

      - name: Install cargo-bundle
        shell: bash
        run: script/install_cargo_bundle

      - name: Install create-dmg
        if: ${{ inputs.artifact_type == 'dmg' }}
        shell: bash
        run: brew install create-dmg

      - name: Build unsigned artifact
        id: bundle_app
        shell: bash
        run: |
          EXTRA_ARGS=()
          if [[ "${{ inputs.fast_build }}" == "true" ]]; then
            echo "Fast build enabled: using --debug profile for quicker compile."
            EXTRA_ARGS+=(--debug)
          fi
          if [[ "${{ inputs.artifact_type }}" == "app" ]]; then
            EXTRA_ARGS+=(--skip-dmg)
          fi
          script/bundle --channel "$CHANNEL" --arch aarch64 --dmg-name-suffix arm64 "${EXTRA_ARGS[@]}"

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ inputs.artifact_type == 'app' && 'openwarp-macos-arm64-app' || 'openwarp-macos-arm64-dmg' }}
          path: ${{ inputs.artifact_type == 'app' && steps.bundle_app.outputs.app_path || steps.bundle_app.outputs.dmg_path }}
          if-no-files-found: error
          retention-days: 14

      - name: Print app run instructions
        if: ${{ inputs.artifact_type == 'app' }}
        shell: bash
        run: |
          echo "App artifact name: openwarp-macos-arm64-app"
          echo "After download on macOS:"
          echo "1) Unzip artifact if needed."
          echo "2) Move OpenWarp.app into /Applications (optional)."
          echo "3) Run with: open /Applications/OpenWarp.app"

      - name: Print DMG run instructions
        if: ${{ inputs.artifact_type == 'dmg' }}
        shell: bash
        run: |
          echo "DMG artifact name: openwarp-macos-arm64-dmg"
          echo "After download on macOS:"
          echo "1) Double-click the DMG."
          echo "2) Drag OpenWarp.app into /Applications."
          echo "3) Run with: open /Applications/OpenWarp.app"
